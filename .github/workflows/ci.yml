name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  screenshot:
    name: Screenshot
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Take screenshot of login page
        run: |
          npx vite preview --port 4173 &
          npx wait-on http://localhost:4173
          npx playwright screenshot --browser chromium http://localhost:4173 screenshot-login.png

      - name: Upload screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: login-screenshot
          path: screenshot-login.png

      - name: Post screenshot comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Upload the screenshot image via GitHub REST API so it can be embedded inline
            const imgData = fs.readFileSync('screenshot-login.png');
            const b64 = imgData.toString('base64');

            // Commit screenshot to a dedicated screenshots branch for inline embedding
            const branch = 'screenshots';
            const filePath = `pr-${context.issue.number}-login.png`;

            let sha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
                ref: branch,
              });
              sha = data.sha;
            } catch (error) {
              if (error && error.status === 404) {
                // File does not yet exist on the screenshots branch; this is expected.
              } else {
                console.error('Failed to fetch existing screenshot content', error);
                throw error;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `chore: update screenshot for PR #${context.issue.number}`,
              content: b64,
              branch,
              ...(sha ? { sha } : {}),
            });

            const rawUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/${filePath}?ts=${Date.now()}`;
            const body = [
              '## 📸 UI Screenshot',
              '',
              `> Captured from the latest build — [Actions run #${context.runId}](${runUrl})`,
              '',
              `![Login Page](${rawUrl})`,
            ].join('\n');

            // Update existing bot comment or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('UI Screenshot'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
